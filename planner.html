    <main class="container">
        <section class="planner-section">
            <h2>Interactive Academic Planner</h2>
            <p>Add, check off, and manage your daily learning tasks and coursework schedules.</p>

            <div class="planner-widget">
                <form id="todo-form">
                    <input type="text" id="task-input" placeholder="Type an academic task (e.g., Set up Snort lab)..." required>
                    <button type="submit" class="btn">Add Task</button>
                </form>

                <ul id="task-list">
                    <!-- Dynamic planner tasks will be injected here by Javascript -->
                </ul>
            </div>
        </section>
